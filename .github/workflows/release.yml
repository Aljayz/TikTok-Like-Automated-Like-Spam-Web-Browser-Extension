name: Release Extension ZIP

on:
  push:
    tags:
      - 'v*'          # Trigger on tags like v1.0, v2.3.1

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          # Include all files required by the extension
          zip -r extension.zip \
            manifest.json \
            content.js \
            popup.html \
            popup.js \
            popup.css \
            super-enhanced-icon.png \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
          name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}